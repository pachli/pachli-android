name: CI

on:
  push:
    tags:
      - '*'
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  CI: true

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # ktlintCheck does not have per-variant tasks, so runs once over everything
  ktlint:
    name: ktlintCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-build-env
        with:
          gradle-cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: ktlintCheck
        run: ./gradlew ktlintCheck

  # Tools are not per-variant
  tools:
    name: Test tools
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-build-env
        with:
          gradle-cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Test tools
        working-directory: tools
        run: ../gradlew test

  # Custom lint rules are not per-variant
  custom-lint:
    name: Custom lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-build-env
        with:
          gradle-cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Test custom lint rules
        working-directory: checks
        run: ../gradlew test

  # Android lint is per-variant
  ci:
    permissions:
      # Required to upload SARIF files
      security-events: write
    strategy:
      matrix:
        # Note: "color" names must be lower-case, to match the case used in file
        # names that "Upload SARIF file" looks for.
        color: [ "orange", "blue" ]
        store: [ "Fdroid", "Github", "Google" ]
        type: [ "Release" ]
        exclude:
          - color: "orange"
            store: "Fdroid"
        api-level: [ 31 ]
        target: [ default ]
    name: Full CI
    runs-on: ubuntu-latest
    needs: [ "check-assignee", "ktlint", "tools", "custom-lint", "screenshots" ]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-build-env
        with:
          gradle-cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # Lint, test, build everything
      - name: Lint, test, build ${{ matrix.color }}${{ matrix.store }}${{ matrix.type }}
        id: runbuild
        run: |
          set +e
          ./gradlew :app:lint${{ matrix.color }}${{ matrix.store }}${{ matrix.type }} test${{ matrix.color }}${{ matrix.store }}${{ matrix.type }}UnitTest assemble${{ matrix.color }}${{ matrix.store }}${{ matrix.type }}
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: app/build/reports/lint-results-${{ matrix.color }}${{ matrix.store }}${{ matrix.type }}.sarif
          category: lint-${{ matrix.color }}${{ matrix.store }}${{ matrix.type }}

      # Exit with whatever exit code the original lint run exited with, to
      # ensure this job fails if lint fails, *but* the lint reports are still
      # uploaded.
      - name: Fail if build failed
        run: exit ${{ steps.runbuild.outputs.exitcode }}

  # Screenshots are taken and validated on orangeGoogleDebug.
  screenshots:
    name: Validate screenshots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true

      - uses: ./.github/actions/setup-build-env
        with:
          gradle-cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Validate screenshots
        run: ./gradlew validateOrangeGoogleDebugScreenshotTest

  check-assignee:
    runs-on: ubuntu-latest
    steps:
      - name: Verify assigned to nikclayton
        env:
          ASSIGNEE: ${{ github.event.pull_request.assignee.login }}
        run: |
          echo "Assignee: :$ASSIGNEE:"
          if [[ "$ASSIGNEE" == "nikclayton" ]]; then
            echo "PR assigned to nikclayton"
            exit 0
          else
            echo "PR not assigned to nikclayton"
            exit 1
          fi

  # Connected tests are per-store-variant, release builds only.
  #
  # They require the other steps to finish to avoid unnecessarily running
  # steps on infrastructure that costs money. In addition, the PR must be
  # assigned to nikclayton, otherwise the tests fail.
  connected:
    strategy:
      matrix:
        color: [ "orange", "blue" ]
        store: [ "Fdroid", "Github", "Google" ]
        # Emulator tests only run in Debug builds
        type: [ "Debug" ]
        exclude:
          - color: "orange"
            store: "Fdroid"
        api-level: [ 31 ]
        target: [ default ]
